# Local infrastructure plane for Enterprise AI Workflow Platform.
# No application services in Phase 1 — those live in apps/ and workers/ in later phases.
# Total memory budget targets ~5.5 GB so this fits comfortably on a 16 GB dev laptop.

name: eaip

networks:
  eaip-net:
    name: eaip-net
    driver: bridge

volumes:
  pgdata:
  redisdata:
  redpandadata:
  miniodata:
  prometheusdata:
  lokidata:
  tempodata:
  grafanadata:

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: eaip-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-eaip}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_local_only}
      POSTGRES_DB: ${POSTGRES_DB:-eaip}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/postgres-init.sql:/docker-entrypoint-initdb.d/00-extensions.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-eaip} -d ${POSTGRES_DB:-eaip}"]
      interval: 5s
      timeout: 3s
      retries: 20
    mem_limit: 1g
    networks: [eaip-net]

  redis:
    image: redis:7-alpine
    container_name: eaip-redis
    restart: unless-stopped
    command:
      - redis-server
      - --requirepass
      - ${REDIS_PASSWORD:-changeme_local_only}
      - --appendonly
      - "yes"
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme_local_only}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    mem_limit: 256m
    networks: [eaip-net]

  redpanda:
    image: redpandadata/redpanda:latest
    container_name: eaip-redpanda
    restart: unless-stopped
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp=1
      - --memory=512M
      - --reserve-memory=0M
      - --node-id=0
      - --check=false
      - --kafka-addr=PLAINTEXT://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      - --advertise-kafka-addr=PLAINTEXT://redpanda:29092,EXTERNAL://localhost:9092
      - --pandaproxy-addr=0.0.0.0:8082
      - --advertise-pandaproxy-addr=localhost:8082
      - --rpc-addr=0.0.0.0:33145
      - --advertise-rpc-addr=redpanda:33145
    ports:
      - "9092:9092"
      - "9644:9644"
    volumes:
      - redpandadata:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health -X admin.hosts=localhost:9644 | grep -q 'Healthy:.*true'"]
      interval: 5s
      timeout: 3s
      retries: 30
    mem_limit: 1g
    networks: [eaip-net]

  redpanda-console:
    image: redpandadata/console:latest
    container_name: eaip-redpanda-console
    restart: unless-stopped
    depends_on:
      redpanda:
        condition: service_healthy
    environment:
      KAFKA_BROKERS: redpanda:29092
      CONNECT_ENABLED: "false"
    ports:
      - "8080:8080"
    mem_limit: 256m
    networks: [eaip-net]

  minio:
    image: minio/minio:latest
    container_name: eaip-minio
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-changeme_local_only}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/minio/health/live || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
    mem_limit: 512m
    networks: [eaip-net]

  # Init container that creates the default bucket once MinIO is healthy.
  minio-init:
    image: minio/mc:latest
    container_name: eaip-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -e
        mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD"
        mc mb --ignore-existing local/eaip-documents
        mc mb --ignore-existing local/eaip-exports
        mc anonymous set none local/eaip-documents
        echo "MinIO buckets ready"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-changeme_local_only}
    restart: "no"
    networks: [eaip-net]

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.114.0
    container_name: eaip-otel-collector
    restart: unless-stopped
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./observability/otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC
      - "13133:13133"   # health_check extension
      - "4318:4318"   # OTLP HTTP
      - "8889:8889"   # Prometheus exporter scrape target
    depends_on:
      tempo:
        condition: service_started
      loki:
        condition: service_started
    mem_limit: 512m
    networks: [eaip-net]

  prometheus:
    image: quay.io/prometheus/prometheus:v3.1.0
    container_name: eaip-prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=7d
      - --web.enable-lifecycle
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheusdata:/prometheus
    ports:
      - "9090:9090"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/healthy || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 10
    mem_limit: 512m
    networks: [eaip-net]

  loki:
    image: grafana/loki:3.2.1
    container_name: eaip-loki
    restart: unless-stopped
    command: ["-config.file=/etc/loki/loki-config.yaml"]
    volumes:
      - ./observability/loki/loki-config.yaml:/etc/loki/loki-config.yaml:ro
      - lokidata:/loki
    ports:
      - "3100:3100"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 20
    mem_limit: 512m
    networks: [eaip-net]

  tempo:
    image: grafana/tempo:2.6.1
    container_name: eaip-tempo
    restart: unless-stopped
    command: ["-config.file=/etc/tempo/tempo-config.yaml"]
    volumes:
      - ./observability/tempo/tempo-config.yaml:/etc/tempo/tempo-config.yaml:ro
      - tempodata:/var/tempo
    ports:
      - "3200:3200"   # tempo HTTP
      - "4327:4317"   # OTLP gRPC (remapped to avoid clash with collector)
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3200/ready || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 20
    mem_limit: 512m
    networks: [eaip-net]

  grafana:
    image: grafana/grafana:11.3.1
    container_name: eaip-grafana
    restart: unless-stopped
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_healthy
      tempo:
        condition: service_healthy
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_FEATURE_TOGGLES_ENABLE: traceqlEditor
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafanadata:/var/lib/grafana
    ports:
      - "3001:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 10
    mem_limit: 512m
    networks: [eaip-net]

  api:
    profiles: [app]
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    image: eaip/api:dev
    container_name: eaip-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # In-container DNS overrides — keep .env values flat for host-side tooling.
      EAIP_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-eaip}:${POSTGRES_PASSWORD:-changeme_local_only}@postgres:5432/${POSTGRES_DB:-eaip}
      EAIP_REDIS_URL: redis://:${REDIS_PASSWORD:-changeme_local_only}@redis:6379/0
      EAIP_KAFKA_BOOTSTRAP_SERVERS: redpanda:29092
      EAIP_OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      EAIP_LOG_LEVEL: ${EAIP_LOG_LEVEL:-INFO}
      EAIP_ENVIRONMENT: ${EAIP_ENVIRONMENT:-local}
      EAIP_AUTH_JWT_PRIVATE_KEY_PATH: ${EAIP_AUTH_JWT_PRIVATE_KEY_PATH:-}
      EAIP_AUTH_JWT_PUBLIC_KEY_PATH: ${EAIP_AUTH_JWT_PUBLIC_KEY_PATH:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      redpanda:
        condition: service_healthy
      otel-collector:
        condition: service_started
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/healthz"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    mem_limit: 512m
    networks: [eaip-net]
