# Pre-commit hooks. Install with: pre-commit install && pre-commit install --hook-type commit-msg
# Run on demand:                  pre-commit run --all-files

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
        exclude: ^.*\.md$
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-toml
      - id: check-json
      - id: check-added-large-files
        args: [--maxkb=1024]
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: detect-private-key
      - id: mixed-line-ending
        args: [--fix=lf]

  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.41.0
    hooks:
      - id: markdownlint
        args: [--config, .markdownlint.json]
        exclude: ^(LICENSE|.*node_modules/.*)

  - repo: https://github.com/adrienverge/yamllint
    rev: v1.35.1
    hooks:
      - id: yamllint
        args: [-d, "{extends: default, rules: {line-length: {max: 140}, document-start: disable, truthy: {check-keys: false}}}"]

  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
        args: [--severity=warning]

  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v3.4.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args: [feat, fix, docs, infra, chore, refactor, test, build, ci, perf, revert]

  # Python lint + format (Phase 2 onwards).
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.6
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        files: ^apps/api/.*\.py$
      - id: ruff-format
        files: ^apps/api/.*\.py$

  # mypy strict over the API package.
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        files: ^apps/api/app/.*\.py$
        args: [--strict, --config-file=apps/api/pyproject.toml]
        additional_dependencies:
          - pydantic>=2.10
          - pydantic-settings>=2.7
          - sqlalchemy>=2.0
          - types-redis

  # Static security scanning of the API package.
  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.0
    hooks:
      - id: bandit
        args: [-c, apps/api/pyproject.toml, --severity-level, medium]
        files: ^apps/api/app/.*\.py$
        additional_dependencies: ["bandit[toml]"]

  # Secret scanning.
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  # TypeScript / web lint — uncomment once apps/web/ exists.
